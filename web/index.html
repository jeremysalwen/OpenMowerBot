<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenMower Discord Assistant</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="layout">
      <main class="app">
        <header class="topbar">
          <div>
            <h1>OpenMower Discord Assistant</h1>
            <p id="summary">Loading index...</p>
          </div>
          <div class="model-controls">
            <select id="answer-mode" aria-label="Answer model">
              <option value="auto">Auto local model</option>
              <option value="api">Hosted API (OpenAI-compatible)</option>
              <optgroup label="WebLLM">
                <option value="webllm:Qwen3-0.6B-q4f16_1-MLC">Qwen3 0.6B (default)</option>
                <option value="webllm:Qwen3.5-0.8B-q4f16_1-MLC">Qwen3.5 0.8B</option>
                <option value="webllm:Qwen3.5-2B-q4f16_1-MLC">Qwen3.5 2B</option>
                <option value="webllm:Qwen3.5-4B-q4f16_1-MLC">Qwen3.5 4B</option>
                <option value="webllm:Llama-3.2-1B-Instruct-q4f16_1-MLC">Llama 3.2 1B</option>
                <option value="webllm:Llama-3.2-3B-Instruct-q4f16_1-MLC">Llama 3.2 3B</option>
                <option value="webllm:Hermes-3-Llama-3.2-3B-q4f16_1-MLC">Hermes 3 Llama 3.2 3B</option>
                <option value="webllm:Phi-4-mini-instruct-q4f16_1-MLC">Phi-4 mini 3.8B</option>
                <option value="webllm:Hermes-3-Llama-3.1-8B-q4f16_1-MLC">Hermes 3 Llama 3.1 8B</option>
              </optgroup>
              <optgroup label="Transformers.js">
                <option value="transformers:onnx-community/functiongemma-270m-it-ONNX">FunctionGemma 270M</option>
                <option value="transformers:onnx-community/Qwen3-0.6B-ONNX">Qwen3 0.6B (default)</option>
                <option value="transformers:onnx-community/Qwen3-1.7B-ONNX">Qwen3 1.7B</option>
                <option value="transformers:onnx-community/Qwen3-4B-ONNX">Qwen3 4B</option>
                <option value="transformers:onnx-community/Qwen3.5-0.8B-ONNX">Qwen3.5 0.8B</option>
                <option value="transformers:onnx-community/Qwen3.5-2B-ONNX">Qwen3.5 2B</option>
                <option value="transformers:onnx-community/Qwen3.5-4B-ONNX">Qwen3.5 4B</option>
              </optgroup>
              <option value="built-in">Built-in browser model</option>
              <option value="evidence">Evidence only</option>
            </select>
            <div id="api-settings" class="api-settings" hidden>
              <input id="api-base-url" type="url" list="api-base-presets" autocomplete="off" spellcheck="false" placeholder="Base URL (e.g. https://api.openai.com/v1)" aria-label="API base URL">
              <datalist id="api-base-presets">
                <option value="https://api.openai.com/v1"></option>
                <option value="https://openrouter.ai/api/v1"></option>
                <option value="https://api.anthropic.com/v1"></option>
                <option value="https://api.groq.com/openai/v1"></option>
                <option value="http://localhost:11434/v1"></option>
              </datalist>
              <input id="api-model" type="text" autocomplete="off" spellcheck="false" placeholder="Model (e.g. gpt-4o-mini)" aria-label="API model">
              <input id="api-key" type="password" autocomplete="off" spellcheck="false" placeholder="API key (kept in this browser)" aria-label="API key">
              <p class="api-note">Key and settings are stored only in this browser's localStorage and sent directly to the endpoint you choose.</p>
            </div>
          </div>
        </header>

        <section id="transcript" class="transcript" aria-live="polite"></section>

        <form id="composer" class="composer">
          <textarea id="query" rows="1" autocomplete="off" placeholder="Ask about the OpenMower Discord history"></textarea>
          <button id="send" type="submit">Send</button>
        </form>
      </main>

      <aside class="sources-panel" aria-label="Sources">
        <h2>Sources</h2>
        <p id="sources-empty" class="sources-empty">Cited Discord messages will appear here.</p>
        <div id="sources-list" class="sources-list"></div>
      </aside>
    </div>

    <script src="./config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
