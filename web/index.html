<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenMower Discord Assistant</title>
    <link rel="stylesheet" href="./styles.css?v=2026-06-26.6">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>OpenMower Discord Assistant</h1>
          <p id="summary">Loading index...</p>
        </div>
        <div class="model-controls">
          <select id="engine" aria-label="Answer engine">
            <option value="auto">Auto LLM</option>
            <option value="webllm">WebLLM</option>
            <option value="transformers">Transformers.js</option>
            <option value="built-in">Built-in</option>
            <option value="evidence">Evidence</option>
          </select>
        </div>
      </header>

      <section id="transcript" class="transcript" aria-live="polite"></section>

      <form id="composer" class="composer">
        <textarea id="query" rows="1" autocomplete="off" placeholder="Ask about the OpenMower Discord history"></textarea>
        <button id="send" type="submit">Send</button>
      </form>
    </main>

    <script type="module" src="./app.js?v=2026-06-26.6"></script>
  </body>
</html>
