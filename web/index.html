<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenMower Discord Assistant</title>
    <link rel="stylesheet" href="./styles.css?v=2026-06-26.5">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>OpenMower Discord Assistant</h1>
          <p id="summary">Loading index...</p>
        </div>
        <div class="model-controls">
          <select id="engine" aria-label="Answer engine">
            <option value="auto">Auto LLM</option>
            <option value="webllm">WebLLM</option>
            <option value="transformers">Transformers.js</option>
            <option value="built-in">Built-in</option>
            <option value="evidence">Evidence</option>
          </select>
          <select id="webllm-model" aria-label="WebLLM model">
            <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">Llama 3.2 1B</option>
            <option value="Qwen2-0.5B-Instruct-q4f16_1-MLC">Qwen2 0.5B</option>
            <option value="Llama-3.2-3B-Instruct-q4f16_1-MLC">Llama 3.2 3B</option>
          </select>
          <select id="transformers-model" aria-label="Transformers.js model">
            <option value="onnx-community/SmolLM2-135M-Instruct-ONNX-MHA">SmolLM2 135M</option>
            <option value="onnx-community/Qwen3-0.6B-ONNX">Qwen3 0.6B</option>
            <option value="onnx-community/gemma-3-270m-it-ONNX">Gemma 3 270M</option>
          </select>
        </div>
      </header>

      <section class="filters" aria-label="Retrieval filters">
        <input id="channel" type="text" autocomplete="off" placeholder="Channel">
        <input id="author" type="text" autocomplete="off" placeholder="Author">
        <input id="after" type="date" aria-label="After date">
        <input id="before" type="date" aria-label="Before date">
        <label class="check">
          <input id="attachments" type="checkbox">
          <span>Attachments</span>
        </label>
      </section>

      <section id="transcript" class="transcript" aria-live="polite"></section>

      <form id="composer" class="composer">
        <textarea id="query" rows="1" autocomplete="off" placeholder="Ask about the OpenMower Discord history"></textarea>
        <button id="send" type="submit">Send</button>
      </form>
    </main>

    <script type="module" src="./app.js?v=2026-06-26.5"></script>
  </body>
</html>
