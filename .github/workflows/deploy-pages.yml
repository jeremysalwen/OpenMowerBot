name: Deploy browser app

# Publishes the static browser search/answer app to GitHub Pages.
# The browser index is rebuilt from the committed corpus on each deploy, so it
# is never committed. Attachments are not published; attachment links fall back
# to the original Discord CDN URLs.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/corpus/**"
      - "src/**"
      - "bin/**"
      - ".github/workflows/deploy-pages.yml"
  # Redeploy after the scheduled corpus update commits new messages.
  workflow_run:
    workflows: ["Update Discord corpus"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Run for pushes/manual/dispatch always; for workflow_run only on success.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build browser index
        run: node ./bin/discord-history.mjs build-browser-index --corpus data/corpus --out data/index/browser

      - name: Assemble site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/web _site/data/index
          cp -R web/. _site/web/
          cp -R data/index/browser _site/data/index/browser
          # Attachments are not published to Pages; link to the Discord CDN.
          printf 'window.DISCORD_HISTORY_CONFIG = { attachmentsLocal: false };\n' > _site/web/config.js
          # Make the bare Pages URL redirect into the app under /web/.
          printf '%s\n' \
            '<!doctype html>' \
            '<meta charset="utf-8">' \
            '<meta http-equiv="refresh" content="0; url=./web/">' \
            '<title>OpenMower Discord Assistant</title>' \
            '<a href="./web/">Open the OpenMower Discord Assistant</a>' \
            > _site/index.html
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
